<main class="page">
    <section class="hero">
        <div class="hero-text">
            <h1>Find your next best friend.</h1>
            <p>Browse adoptable dogs and save your favorites to review later.</p>

            <div class="actions">
                <a routerLink="/browse" class="primary">Browse Dogs</a>

                <a *ngIf="!auth.isLoggedIn()" routerLink="/customer/login" class="ghost">
                    Customer Login
                </a>

                <a *ngIf="auth.isLoggedIn()" routerLink="/browse" class="ghost">
                    View Favorites ❤️
                </a>
            </div>
        </div>

        <div class="hero-card">
            <div class="badge">New</div>
            <div class="big">Favorites ❤️</div>
            <div class="small">Log in to save dogs you love.</div>
        </div>
    </section>
</main>
